{{>head.html}}

<body class="bg-xblack text-xtext font-sans antialiased flex h-screen overflow-hidden">

    {{>leftsidebar.html}}

    <main class="flex-1 border-r border-xborder h-full overflow-y-auto no-scrollbar">
        <header class="sticky top-0 bg-xblack/80 backdrop-blur-md z-10 border-b border-xborder flex">
            <button
                class="feed-tab flex-1 py-4 text-center hover:bg-xborder/30 transition-colors relative text-white font-bold">
                For you
                <div
                    class="tab-underline absolute bottom-0 left-1/2 transform -translate-x-1/2 w-16 h-1 bg-xgreen rounded-full">
                </div>
            </button>
            <button class="feed-tab flex-1 py-4 text-center text-xmuted hover:bg-xborder/30 transition-colors relative">
                Following
                <div
                    class="tab-underline absolute bottom-0 left-1/2 transform -translate-x-1/2 w-16 h-1 bg-xgreen rounded-full hidden">
                </div>
            </button>
        </header>

        <form id="post-form" class="p-4 border-b border-xborder flex space-x-4" action="/post" method="POST">
            <div class="w-10 h-10 rounded-full bg-xborder flex-shrink-0 flex items-center justify-center font-bold">
                {{user_initials}}
            </div>
            <div class="flex-1">
                <textarea id="content" name="content"
                    class="w-full bg-transparent text-xl placeholder-xmuted outline-none resize-none mt-2" rows="2"
                    placeholder="What's happening at NCU?" required></textarea>
                <div class="flex justify-between items-center mt-4 border-t border-xborder/50 pt-3">
                    <div class="flex space-x-2 text-xgreen">
                        <button type="button" class="p-2 hover:bg-xgreen/10 rounded-full transition-colors">
                            <i class="ph ph-image text-xl"></i>
                        </button>
                        <button type="button" class="p-2 hover:bg-xgreen/10 rounded-full transition-colors">
                            <i class="ph ph-chart-bar text-xl"></i>
                        </button>
                        <button type="button" class="p-2 hover:bg-xgreen/10 rounded-full transition-colors">
                            <i class="ph ph-smiley text-xl"></i>
                        </button>
                    </div>
                    <button type="submit" id="post-btn"
                        class="bg-xgreen text-xblack font-bold py-1.5 px-6 rounded-full hover:bg-opacity-90 transition-colors">
                        Post
                    </button>
                </div>
            </div>
        </form>

        <div id="feed-container">
            {{#posts}}
            <article
                class="p-4 border-b border-xborder hover:bg-xborder/10 transition-colors cursor-pointer flex space-x-3">
                <div
                    class="w-10 h-10 rounded-full bg-xborder flex-shrink-0 flex items-center justify-center text-sm font-bold mt-1">
                    {{author_initials}}
                </div>

                <div class="flex-1">
                    <div class="flex items-center space-x-1 text-sm">
                        <a href="/profile/{{author_handle}}" class="font-bold hover:underline">{{author_name}}</a>
                        {{#is_verified}}
                        <i class="ph-fill ph-seal-check text-[#1DA1F2] text-[16px] ml-0.5" title="Verified"></i>
                        {{/is_verified}}

                        <span class="text-[10px] font-bold px-1.5 py-0.5 rounded border ml-1
                            {{#is_user}}text-xgreen border-xgreen/30 bg-xgreen/10{{/is_user}}
                            {{#is_prof}}text-blue-400 border-blue-400/30 bg-blue-400/10{{/is_prof}}
                            {{#is_staff}}text-orange-400 border-orange-400/30 bg-orange-400/10{{/is_staff}}">
                            {{author_role}}
                        </span>

                        <span class="text-xmuted ml-1">{{author_handle}} · {{time_ago}}</span>
                    </div>

                    <div class="mt-1 text-[15px] leading-snug whitespace-pre-wrap">{{body}}</div>

                    <div class=" flex justify-between items-center mt-3
                        text-xmuted w-full max-w-md">
                        <a href="/updatepost?action=3&id={{id}}"
                            class="flex items-center space-x-2 hover:text-blue-400 transition-colors group">
                            <div class="p-1.5 group-hover:bg-blue-400/10 rounded-full">
                                <i class="ph ph-chat-circle text-lg"></i>
                            </div>
                            <span class="text-xs">{{replies}}</span>
                        </a>
                        <a href="/updatepost?action=2&id={{id}}"
                            class="flex items-center space-x-2 hover:text-xgreen transition-colors group">
                            <div class="p-1.5 group-hover:bg-xgreen/10 rounded-full">
                                <i class="ph ph-arrows-left-right text-lg"></i>
                            </div>
                            <span class="text-xs">{{reposts}}</span>
                        </a>
                        <a href="/updatepost?action=1&id={{id}}"
                            class="flex items-center space-x-2 hover:text-pink-500 transition-colors group">
                            <div class="p-1.5 group-hover:bg-pink-500/10 rounded-full">
                                <i class="ph ph-heart text-lg"></i>
                            </div>
                            <span class="text-xs">{{likes}}</span>
                        </a>
                        <a href="/updatepost/" class="flex items-center hover:text-blue-400 transition-colors group">
                            <div class="p-1.5 group-hover:bg-blue-400/10 rounded-full">
                                <i class="ph ph-export text-lg"></i>
                            </div>
                        </a>
                    </div>
                </div>
            </article>
            {{/posts}}
        </div>
    </main>

    {{>rightsidebar.html}}

    <script src="/static/script.js"></script>
</body>

</html>
