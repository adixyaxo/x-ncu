<aside class="hidden lg:block w-80 p-4 h-full border-l border-xborder overflow-y-auto">

    <div class="bg-xdark rounded-2xl p-4 border border-xborder/50 mb-4">
        <h2 class="text-xl font-extrabold mb-4">What's happening</h2>

        <div class="space-y-1">
            <div
                class="flex justify-between items-start hover:bg-xborder/20 p-2 -mx-2 rounded-xl transition-colors cursor-pointer">
                <div>
                    <p class="text-xs text-xmuted">Trending at NCU</p>
                    <p class="font-bold mt-0.5">#EndSems2026</p>
                    <p class="text-xs text-xmuted mt-0.5">3.4K posts</p>
                </div>
                <div class="text-xmuted hover:text-blue-500 transition-colors">
                    <svg viewBox="0 0 24 24" class="w-5 h-5 fill-current" aria-hidden="true">
                        <circle cx="5" cy="12" r="2"></circle>
                        <circle cx="12" cy="12" r="2"></circle>
                        <circle cx="19" cy="12" r="2"></circle>
                    </svg>
                </div>
            </div>

            <div
                class="flex justify-between items-start hover:bg-xborder/20 p-2 -mx-2 rounded-xl transition-colors cursor-pointer">
                <div>
                    <p class="text-xs text-xmuted">CSE · Trending</p>
                    <p class="font-bold mt-0.5">#100DaysOfCode</p>
                    <p class="text-xs text-xmuted mt-0.5">1.2K posts</p>
                </div>
                <div class="text-xmuted hover:text-blue-500 transition-colors">
                    <svg viewBox="0 0 24 24" class="w-5 h-5 fill-current" aria-hidden="true">
                        <circle cx="5" cy="12" r="2"></circle>
                        <circle cx="12" cy="12" r="2"></circle>
                        <circle cx="19" cy="12" r="2"></circle>
                    </svg>
                </div>
            </div>

            <div
                class="flex justify-between items-start hover:bg-xborder/20 p-2 -mx-2 rounded-xl transition-colors cursor-pointer">
                <div>
                    <p class="text-xs text-xmuted">Tech · Trending</p>
                    <p class="font-bold mt-0.5">#MERNStack</p>
                    <p class="text-xs text-xmuted mt-0.5">856 posts</p>
                </div>
                <div class="text-xmuted hover:text-blue-500 transition-colors">
                    <svg viewBox="0 0 24 24" class="w-5 h-5 fill-current" aria-hidden="true">
                        <circle cx="5" cy="12" r="2"></circle>
                        <circle cx="12" cy="12" r="2"></circle>
                        <circle cx="19" cy="12" r="2"></circle>
                    </svg>
                </div>
            </div>

            <div class="p-2 -mx-2 rounded-xl hover:bg-xborder/20 transition-colors cursor-pointer mt-2">
                <span class="text-blue-500 hover:text-blue-400 text-sm font-medium">Show more</span>
            </div>
        </div>
    </div>

    <div class="bg-xdark rounded-2xl p-4 border border-xborder/50">

        <h2 class="text-xl font-extrabold mb-4">Campus News</h2>

        <div class="space-y-4">
            {{#news}}
            <div class="hover:bg-xborder/20 p-2 -mx-2 rounded-xl transition-colors cursor-pointer">
                <p class="font-bold text-sm leading-snug text-white">{{headline}}</p>
                <div class="flex items-center mt-2 space-x-2">
                    <div class="flex -space-x-1.5">
                        <div class="w-5 h-5 rounded-full bg-blue-600 border border-xdark"></div>
                        <div class="w-5 h-5 rounded-full bg-purple-600 border border-xdark"></div>
                    </div>
                    <p class="text-xs text-xmuted">{{time_ago}} · {{category}} · {{post_count}} posts</p>
                </div>
            </div>
            {{/news}}
        </div>

    </div>
</aside>
