<script>
    document.addEventListener("DOMContentLoaded", () => {
        const updateActiveTab = () => {
            // 1. Get current hash from URL, default to '#/' if empty
            const currentHash = window.location.hash || '#/';

            // 2. Select all navigation links
            const navLinks = document.querySelectorAll('.nav-link');

            navLinks.forEach(link => {
                // 3. Reset all links to their inactive state
                link.classList.remove('active', 'bg-xborder/50', 'text-white');
                link.classList.add('text-gray-300'); // Add the muted gray color back

                // 4. If the link's href matches the current URL hash, make it active
                if (link.getAttribute('href') === currentHash) {
                    link.classList.add('active', 'bg-xborder/50', 'text-white'); // Add active background and bright text
                    link.classList.remove('text-gray-300'); // Remove muted text color
                }
            });
        };

        // Run on initial page load
        updateActiveTab();

        // Listen for changes in the URL hash (when a user clicks a link)
        window.addEventListener('hashchange', updateActiveTab);
    });
</script>
