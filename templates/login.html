<style>
    /* Grainy effect overlay */
    .bg-grain {
        position: relative;
        overflow: hidden;
    }

    .bg-grain::after {
        content: "";
        position: absolute;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease;
        z-index: 0;
        mix-blend-mode: overlay;
    }

    .bg-grain:hover::after {
        opacity: 0.12;
    }

    .bg-grain.active::after {
        opacity: 0.25;
    }

    .bg-grain>* {
        position: relative;
        z-index: 10;
    }

    /* Animated Transparent Rainbow Dropdown */
    @keyframes rainbow-blend {
        0% {
            background-position: 0% 50%;
        }

        50% {
            background-position: 100% 50%;
        }

        100% {
            background-position: 0% 50%;
        }
    }

    .logout-rainbow {
        /* Soft, transparent, light pastel gradient */
        background: linear-gradient(124deg, rgba(255, 182, 193, 0.15), rgba(173, 216, 230, 0.15), rgba(144, 238, 144, 0.15), rgba(221, 160, 221, 0.15));
        background-size: 300% 300%;
        animation: rainbow-blend 6s ease infinite;
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.15);
    }
</style>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        // --- 1. ACTIVE TAB LOGIC (Fixed to use Pathname) ---
        const updateActiveTab = () => {
            // Get current path from URL (e.g., '/', '/students')
            const currentPath = window.location.pathname;
            const navLinks = document.querySelectorAll('.nav-link');

            navLinks.forEach(link => {
                // Reset all links
                link.classList.remove('active', 'bg-xborder/50', 'text-white');
                link.classList.add('text-gray-300');

                // Check if the link's href matches the current path exactly
                if (link.getAttribute('href') === currentPath) {
                    link.classList.add('active', 'bg-xborder/50', 'text-white');
                    link.classList.remove('text-gray-300');
                }
            });
        };

        // Run on initial load
        updateActiveTab();

        // --- 2. PROFILE NAVIGATION & DROPDOWN LOGIC ---
        const userHandle = '{{user_handle}}';
        const profileNavigateBtn = document.getElementById('profile-navigate-btn');
        const threeDotsBtn = document.getElementById('three-dots-btn');
        const logoutPopup = document.getElementById('logout-popup');
        const logoutAction = document.getElementById('logout-action');

        if (profileNavigateBtn) {
            profileNavigateBtn.addEventListener('click', () => {
                const cleanHandle = userHandle.replace('@', '');
                window.location.href = `/profile/${cleanHandle}`;
            });
        }

        if (threeDotsBtn) {
            threeDotsBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                logoutPopup.classList.toggle('hidden');
            });
        }

        document.addEventListener('click', (e) => {
            if (!logoutPopup.contains(e.target) && !threeDotsBtn.contains(e.target)) {
                logoutPopup.classList.add('hidden');
            }
        });

        if (logoutAction) {
            logoutAction.addEventListener('click', (e) => {
                e.stopPropagation();
                logoutPopup.classList.add('hidden');
                console.log(`Logging out ${userHandle}...`);
                // window.location.href = '/logout'; 
            });
        }
    });
</script>
