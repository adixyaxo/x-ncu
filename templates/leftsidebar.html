<style>
    /* Grainy effect overlay */
    .bg-grain {
        position: relative;
        overflow: hidden;
    }

    .bg-grain::after {
        content: "";
        position: absolute;
        inset: 0;
        /* Inline SVG noise filter */
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease;
        z-index: 0;
        mix-blend-mode: overlay;
        /* Blends nicely with dark backgrounds */
    }

    /* Show light grain on hover */
    .bg-grain:hover::after {
        opacity: 0.12;
    }

    /* Show heavier grain on the active route */
    .bg-grain.active::after {
        opacity: 0.25;
    }

    /* Ensure text and icons stay above the grain */
    .bg-grain>* {
        position: relative;
        z-index: 10;
    }
</style>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const updateActiveTab = () => {
                // 1. Get current hash from URL, default to '#/' if empty
                const currentHash = window.location.hash || '#/';

                // 2. Select all navigation links
                const navLinks = document.querySelectorAll('.nav-link');

                navLinks.forEach(link => {
                    // 3. Reset all links to their inactive state
                    link.classList.remove('active', 'bg-xborder/50', 'text-white');
                    link.classList.add('text-gray-300'); // Add the muted gray color back

                    // 4. If the link's href matches the current URL hash, make it active
                    if (link.getAttribute('href') === currentHash) {
                        link.classList.add('active', 'bg-xborder/50', 'text-white'); // Add active background and bright text
                        link.classList.remove('text-gray-300'); // Remove muted text color
                    }
                });
            };

            // Run on initial page load
            updateActiveTab();

            // Listen for changes in the URL hash (when a user clicks a link)
            window.addEventListener('hashchange', updateActiveTab);
        });
    </script>
